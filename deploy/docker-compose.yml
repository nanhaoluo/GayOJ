services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      GAYOJ_ENV: ${GAYOJ_ENV:-development}
      GAYOJ_SECRET_KEY: ${GAYOJ_SECRET_KEY:-dev-only-replace-with-a-random-token}
      GAYOJ_TOKEN_TTL_HOURS: ${GAYOJ_TOKEN_TTL_HOURS:-12}
      GAYOJ_OFFLINE_PACK_SECRET: ${GAYOJ_OFFLINE_PACK_SECRET:-dev-only-replace-with-offline-pack-secret}
      GAYOJ_OFFLINE_PACK_TTL_HOURS: ${GAYOJ_OFFLINE_PACK_TTL_HOURS:-168}
      GAYOJ_API_CORS_ORIGINS: ${GAYOJ_API_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}
      GAYOJ_STORAGE_BACKEND: ${GAYOJ_STORAGE_BACKEND:-mysql}
      GAYOJ_DEV_DB_JSON_PATH: ${GAYOJ_DEV_DB_JSON_PATH:-apps/api/storage/dev-db.json}
      GAYOJ_SQLITE_PATH: ${GAYOJ_SQLITE_PATH:-apps/api/storage/gayoj.sqlite3}
      GAYOJ_SQLITE_BUSY_TIMEOUT_MS: ${GAYOJ_SQLITE_BUSY_TIMEOUT_MS:-5000}
      GAYOJ_SQLITE_CACHE_ENABLED: ${GAYOJ_SQLITE_CACHE_ENABLED:-true}
      GAYOJ_MYSQL_HOST: ${GAYOJ_MYSQL_HOST:-127.0.0.1}
      GAYOJ_MYSQL_PORT: ${GAYOJ_MYSQL_PORT:-3306}
      GAYOJ_MYSQL_USER: ${GAYOJ_MYSQL_USER:-gayoj}
      GAYOJ_MYSQL_PASSWORD: ${GAYOJ_MYSQL_PASSWORD:-gayoj}
      GAYOJ_MYSQL_DATABASE: ${GAYOJ_MYSQL_DATABASE:-gayoj}
      GAYOJ_MYSQL_CHARSET: ${GAYOJ_MYSQL_CHARSET:-utf8mb4}
      GAYOJ_MYSQL_URL: ${GAYOJ_MYSQL_URL:-}
      GAYOJ_MYSQL_CONNECT_TIMEOUT_SECONDS: ${GAYOJ_MYSQL_CONNECT_TIMEOUT_SECONDS:-2}
    ports:
      - "${GAYOJ_COMPOSE_API_PORT:-8000}:8000"
    volumes:
      - gayoj-api-storage:/app/apps/api/storage

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    depends_on:
      - api
    ports:
      - "${GAYOJ_COMPOSE_WEB_PORT:-8080}:80"

volumes:
  gayoj-api-storage:
